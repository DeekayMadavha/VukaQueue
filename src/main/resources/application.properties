# =============================================
# DATABASE ? PostgreSQL (localhost)
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/VukaQueueDB
spring.datasource.username=postgres
spring.datasource.password=Loan Management System
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# LOGGING
# =============================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =============================================
# SERVER
# =============================================
server.port=8080

# =============================================
# JWT
# =============================================
# Must be at least 32 characters for HS256 ? change this in production
app.jwt.secret=VukaQueueSuperSecretKey2025MustBeAtLeast32Chars!
app.jwt.expiration-ms=86400000